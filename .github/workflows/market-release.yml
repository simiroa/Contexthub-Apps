name: Marketplace Release

on:
  push:
    branches: [main]
    paths:
      - ".github/scripts/package_apps.py"
      - ".github/workflows/market-release.yml"
      - "3d/**"
      - "ai/**"
      - "ai_lite/**"
      - "audio/**"
      - "comfyui/**"
      - "document/**"
      - "image/**"
      - "native/**"
      - "system/**"
      - "utilities/**"
      - "video/**"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Package Apps and Update Registry
        run: |
          mkdir -p dist
          python3 .github/scripts/package_apps.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit Updated Registry
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market.json
          git commit -m "chore: update market.json registry [skip ci]" || echo "No changes to commit"
          git push

      - name: Purge Old Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete marketplace-latest --yes || echo "Old release not found"
          git push origin :refs/tags/marketplace-latest || echo "Old tag not found"
        continue-on-error: true

      - name: Create/Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create marketplace-latest dist/*.zip \
            --title "Marketplace Assets (Latest)" \
            --notes "Auto-generated marketplace bundles. Updated on ${{ github.event.head_commit.timestamp }}" \
            --latest
